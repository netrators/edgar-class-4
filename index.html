<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VIP Travel & Backstage Slang - Premium English B1 Masterclass">
    <title>Masterclass Premium: VIP Travel & Backstage Slang</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { 50: '#e6e9ef', 100: '#b0b9cb', 200: '#8b9bb4', 300: '#657d9c', 400: '#486283', 500: '#2a4365', 600: '#233855', 700: '#1b2d44', 800: '#112240', 900: '#0A192F' },
                        gold: { 50: '#fcfaf7', 100: '#f9f6f0', 200: '#f0e8d9', 300: '#e6d5b8', 400: '#d4bd94', 500: '#C5A880', 600: '#b39162', 700: '#9b8464', 800: '#826f55', 900: '#6a5a46' },
                        jewel: { rose: '#e11d48', amethyst: '#8b5cf6', emerald: '#10b981', sapphire: '#0ea5e9' }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in-down': 'fadeInDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in-left': 'fadeInLeft 0.5s ease-out forwards',
                        'fade-in-right': 'fadeInRight 0.5s ease-out forwards',
                        'shake': 'shake 0.5s ease-in-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 4s ease-in-out infinite',
                        'spin-slow': 'spin 12s linear infinite',
                        'bounce-slight': 'bounceSlight 2s infinite',
                        'fly': 'fly 6s linear infinite',
                        'blob': 'blob 7s infinite',
                        'wave': 'wave 1s ease-in-out infinite'
                    },
                    keyframes: {
                        fadeInUp: { '0%': { opacity: '0', transform: 'translateY(40px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        fadeInDown: { '0%': { opacity: '0', transform: 'translateY(-40px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        fadeInLeft: { '0%': { opacity: '0', transform: 'translateX(-40px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
                        fadeInRight: { '0%': { opacity: '0', transform: 'translateX(40px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
                        shake: { '0%, 100%': { transform: 'translateX(0)' }, '20%, 60%': { transform: 'translateX(-8px)' }, '40%, 80%': { transform: 'translateX(8px)' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-15px)' } },
                        bounceSlight: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-5px)' } },
                        fly: { '0%': { transform: 'translate(0, 0) rotate(0deg)' }, '25%': { transform: 'translate(10px, -10px) rotate(5deg)' }, '50%': { transform: 'translate(20px, 0) rotate(0deg)' }, '75%': { transform: 'translate(10px, 10px) rotate(-5deg)' }, '100%': { transform: 'translate(0, 0) rotate(0deg)' } },
                        blob: { '0%': { transform: 'translate(0px, 0px) scale(1)' }, '33%': { transform: 'translate(30px, -50px) scale(1.1)' }, '66%': { transform: 'translate(-20px, 20px) scale(0.9)' }, '100%': { transform: 'translate(0px, 0px) scale(1)' } },
                        wave: { '0%, 100%': { height: '8px' }, '50%': { height: '32px' } }
                    }
                }
            }
        }
    </script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f8f9fa; 
            overflow: hidden; 
        }
        
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4bd94; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #b39162; }

        .progress-ring__circle {
            transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .bg-dot-pattern {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        
        .glass-panel-dark {
            background: rgba(10, 25, 47, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fib-input {
            width: 140px;
            transition: all 0.3s ease;
        }
        .fib-input:focus {
            width: 160px;
            outline: none;
            border-bottom-color: #C5A880;
        }

        /* Animation delays for waveform */
        .wave-bar:nth-child(1) { animation-delay: 0.0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // =====================================================================
        // 1. AUDIO SYSTEM (Web Audio API Synthesizer & TTS)
        // =====================================================================
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const playSound = (type) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            switch(type) {
                case 'correct':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.exponentialRampToValueAtTime(1046.50, now + 0.1);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'wrong':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
                case 'tick':
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(800, now);
                    gainNode.gain.setValueAtTime(0.1, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now);
                    osc.stop(now + 0.05);
                    break;
                case 'fanfare':
                    [523.25, 659.25, 783.99].forEach(freq => { 
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.type = 'square';
                        o.frequency.setValueAtTime(freq, now);
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        g.gain.setValueAtTime(0.1, now);
                        g.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
                        o.start(now);
                        o.stop(now + 1.5);
                    });
                    break;
            }
        };

        const speakText = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; 
                
                const voices = window.speechSynthesis.getVoices();
                const englishVoice = voices.find(v => v.lang.includes('en-US') && v.name.includes('Female')) 
                                  || voices.find(v => v.lang.includes('en-GB') && v.name.includes('Female'))
                                  || voices.find(v => v.lang.includes('en'));
                if (englishVoice) utterance.voice = englishVoice;
                
                window.speechSynthesis.speak(utterance);
            }
        };

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        // =====================================================================
        // 2. SVG ICON LIBRARY
        // =====================================================================

        const Icons = {
            Volume: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>,
            Mic: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x1="12" y1="19" y2="22"></line></svg>,
            Check: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>,
            X: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Menu: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>,
            ChevronRight: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>,
            ChevronLeft: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>,
            Star: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>,
            Refresh: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>,
            Play: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
            Award: ({ size=40, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>,
            Globe: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>,
            Heart: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>,
            User: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Message: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>,
            Lock: ({ size=16, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
            BookOpen: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
            Lightbulb: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>,
            Plane: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.7l-1.2 3.6c-.2.5.1 1.1.6 1.2l6.2 1.8L7.5 15l-3.3-.6c-.4-.1-.8.1-1 .5l-1 2c-.2.4 0 .9.4 1l4.9 1.6 1.6 4.9c.1.4.6.6 1 .4l2-1c.4-.2.6-.6.5-1l-.6-3.3 1.5-1.8 1.8 6.2c.1.5.7.8 1.2.6l3.6-1.2c.5-.2.8-.6.7-1.1z"></path></svg>,
            MapPin: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>,
            Briefcase: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>,
            Smile: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" x1="9.01" y1="9" y2="9"></line><line x1="15" x1="15.01" y1="9" y2="9"></line></svg>,
            Headphones: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
        };

        // =====================================================================
        // 3. REUSABLE UI COMPONENTS
        // =====================================================================

        const TTSButton = ({ text, className="", title="Listen to pronunciation" }) => (
            <button 
                onClick={(e) => { e.stopPropagation(); speakText(text); }}
                className={`p-3 rounded-full transition-all duration-300 hover:scale-110 active:scale-95 flex-shrink-0 shadow-sm ${className}`}
                title={title}
                aria-label={title}
            >
                <Icons.Volume size={20} />
            </button>
        );

        const Chunk = ({ type, children }) => {
            const styles = {
                modal: "bg-gradient-to-r from-blue-100 to-blue-200 text-blue-800 border-blue-300",
                verb: "bg-gradient-to-r from-emerald-100 to-emerald-200 text-emerald-800 border-emerald-300",
                slang: "bg-gradient-to-r from-orange-100 to-rose-100 text-rose-800 border-rose-300",
                noun: "bg-gradient-to-r from-purple-100 to-amethyst-200 text-purple-800 border-purple-300",
                aux: "bg-gradient-to-r from-pink-100 to-rose-200 text-rose-800 border-rose-300"
            };
            return (
                <span className={`inline-block px-3 py-1 mx-1 rounded-lg font-bold border ${styles[type]} shadow-sm transition-transform hover:-translate-y-1`}>
                    {children}
                </span>
            );
        };

        const Button = ({ children, onClick, disabled, variant='primary', className="", icon: Icon }) => {
            const base = "flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold transition-all duration-300 shadow-sm active:scale-95 disabled:opacity-50 disabled:pointer-events-none";
            const variants = {
                primary: "bg-gradient-to-r from-navy-800 to-navy-900 text-white hover:shadow-lg hover:-translate-y-0.5 border border-transparent",
                secondary: "bg-gradient-to-r from-gold-400 to-gold-600 text-navy-900 hover:shadow-lg border border-transparent",
                outline: "border-2 border-navy-900 text-navy-900 hover:bg-navy-50",
                ghost: "bg-transparent text-gray-600 shadow-none hover:bg-white hover:text-navy-900 hover:shadow-sm"
            };
            return (
                <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>
                    {children}
                    {Icon && <Icon size={20} />}
                </button>
            );
        };

        const Badge = ({ children, color="navy" }) => {
            const colors = {
                navy: "bg-navy-100 text-navy-800 border-navy-200",
                gold: "bg-gold-100 text-gold-800 border-gold-200",
                emerald: "bg-emerald-100 text-emerald-800 border-emerald-200",
                rose: "bg-rose-100 text-rose-800 border-rose-200"
            };
            return (
                <span className={`inline-flex items-center px-3 py-1 rounded-full text-xs font-bold tracking-widest uppercase border shadow-sm ${colors[color]}`}>
                    {children}
                </span>
            );
        };

        // =====================================================================
        // 4. INTERACTIVE ACTIVITY COMPONENTS
        // =====================================================================

        // 4.1 Pronunciation & Speaking Practice Clinic (NEW)
        const PronunciationPractice = ({ title, context, phrases }) => {
            const [currentIdx, setCurrentIdx] = useState(0);
            const [isRecording, setIsRecording] = useState(false);
            const [feedback, setFeedback] = useState(null);

            const phrase = phrases[currentIdx];

            const handleRecord = () => {
                setIsRecording(true);
                setFeedback(null);
                
                // Simulate recording time and AI analysis
                setTimeout(() => {
                    setIsRecording(false);
                    const feedbacks = [
                        { msg: "Excellent rhythm and intonation! 🌟", type: 'perfect' },
                        { msg: "Great! Make sure to blend the words naturally.", type: 'good' },
                        { msg: "Nailed it! Sounded completely natural.", type: 'perfect' },
                        { msg: "Very good pronunciation. Keep practicing the pause.", type: 'good' }
                    ];
                    setFeedback(feedbacks[Math.floor(Math.random() * feedbacks.length)]);
                    playSound('correct');
                }, 3000);
            };

            const nextPhrase = () => {
                setCurrentIdx((prev) => (prev + 1) % phrases.length);
                setFeedback(null);
            };

            return (
                <div className="w-full max-w-4xl mx-auto animate-fade-in-up">
                    <div className="glass-panel p-8 md:p-12 rounded-[2.5rem] shadow-2xl border-t-8 border-jewel-rose relative overflow-hidden">
                        
                        {/* Decorative background gradients */}
                        <div className="absolute top-0 right-0 w-64 h-64 bg-jewel-rose rounded-full opacity-10 blur-3xl translate-x-1/2 -translate-y-1/2"></div>
                        <div className="absolute bottom-0 left-0 w-64 h-64 bg-jewel-sapphire rounded-full opacity-10 blur-3xl -translate-x-1/2 translate-y-1/2"></div>

                        <div className="text-center mb-8 relative z-10">
                            <Badge color="rose">Speaking Clinic</Badge>
                            <h3 className="text-3xl font-extrabold text-navy-900 mt-4 mb-2">{title}</h3>
                            <p className="text-gray-600">{context}</p>
                        </div>

                        <div className="bg-white/80 p-8 rounded-3xl shadow-sm border border-gray-100 text-center mb-8 relative z-10 min-h-[200px] flex flex-col justify-center">
                            <p className="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Phrase {currentIdx + 1} of {phrases.length}</p>
                            <p className="text-2xl md:text-4xl font-light text-navy-900 leading-relaxed mb-4" dangerouslySetInnerHTML={{ __html: phrase.html }}></p>
                            {phrase.tip && <p className="text-jewel-rose text-sm font-bold bg-rose-50 inline-block px-4 py-2 rounded-full mx-auto">💡 Tip: {phrase.tip}</p>}
                        </div>

                        <div className="flex flex-col md:flex-row items-center justify-center gap-6 relative z-10">
                            
                            <button

        // 4.2 3D Flashcards Deck
        const FlashcardDeck = ({ cards, deckName }) => {

            return (
                <div className="w-full max-w-md mx-auto flex flex-col items-center">

                                <h4 className="text-gold-400 font-bold uppercase tracking-widest mb-2 text-xs">Meaning</h4>
                                <p className="text-xl mb-6 font-light leading-snug text-gray-100">{card.def}</p>

                        <Button variant="primary" onClick={nextCard} className="flex-1 justify-center py-4">Next <Icons.ChevronRight size={20}/></Button>
                    </div>
                </div>
            );
        };

        // 4.3 Interactive Quiz
        const QuizMCQ = ({ questions }) => {
            const [currentQ, setCurrentQ] = useState(0);
            const [selected, setSelected] = useState(null);
            const [showExplanation, setShowExplanation] = useState(false);
            const [score, setScore] = useState(0);
            const [isFinished, setIsFinished] = useState(false);

            const handleAnswer = (index) => {
                if (selected !== null) return;
                setSelected(index);
                if (index === questions[currentQ].ans) {
                    playSound('correct');
                    setScore(s => s + 1);
                } else {
                    playSound('wrong');
                }
                setShowExplanation(true);
            };

            const nextQuestion = () => {
                if (currentQ < questions.length - 1) {
                    setCurrentQ(c => c + 1);
                    setSelected(null);
                    setShowExplanation(false);
                } else {
                    playSound('fanfare');
                    setIsFinished(true);
                }
            };

            if (isFinished) {
                const perc = (score / questions.length) * 100;
                return (
                    <div className="glass-panel p-10 md:p-14 rounded-3xl shadow-2xl text-center border-t-8 border-gold-500 animate-fade-in-up">
                        <Icons.Award size={80} className={`mx-auto mb-6 ${perc === 100 ? 'text-gold-500 animate-pulse-slow' : 'text-navy-300'}`} />
                        <h3 className="text-4xl font-extrabold text-navy-900 mb-4">Quiz Completed!</h3>
                        <p className="text-xl text-gray-600 mb-8">Score: <strong className="text-navy-900 text-3xl">{score} / {questions.length}</strong></p>
                        <Button onClick={() => { setCurrentQ(0); setSelected(null); setShowExplanation(false); setScore(0); setIsFinished(false); }} variant="primary" className="mx-auto" icon={Icons.Refresh}>Try Again</Button>
                    </div>
                );
            }

            const q = questions[currentQ];

            return (
                <div className="glass-panel p-8 md:p-12 rounded-[2.5rem] shadow-xl animate-fade-in-right relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-gold-500 opacity-5 blur-2xl rounded-full"></div>
                    
                    <div className="flex justify-between items-center mb-8 border-b border-gray-200/50 pb-4 relative z-10">
                        <Badge color="navy">Question {currentQ + 1} of {questions.length}</Badge>
                        <span className="font-bold text-gray-400">Score: {score}</span>
                    </div>
                    
                    <h3 className="text-2xl md:text-3xl font-bold text-navy-900 mb-8 leading-tight relative z-10">{q.text}</h3>
                    
                    <div className="space-y-4 relative z-10">
                        {q.options.map((opt, idx) => {
                            const isSelected = selected === idx;
                            const isCorrect = q.ans === idx;
                            const showStatus = selected !== null;
                            
                            let btnClass = "w-full p-5 rounded-2xl border-2 text-left font-bold text-lg flex items-center justify-between transition-all duration-300 ";
                            
                            if (!showStatus) {
                                btnClass += "border-white bg-white/50 text-navy-800 hover:border-gold-400 hover:bg-white shadow-sm hover:shadow-md hover:-translate-y-1";
                            } else if (isCorrect) {
                                btnClass += "border-emerald-500 bg-emerald-50 text-emerald-800 shadow-md transform scale-[1.02]";
                            } else if (isSelected && !isCorrect) {
                                btnClass += "border-rose-500 bg-rose-50 text-rose-800 animate-shake";
                            } else {
                                btnClass += "border-white/50 bg-white/20 text-gray-400 opacity-50";
                            }

                            return (
                                <button key={idx} disabled={showStatus} onClick={() => handleAnswer(idx)} className={btnClass}>
                                    <span className="flex items-center gap-4">
                                        <span className={`flex items-center justify-center w-8 h-8 rounded-full text-sm shadow-sm ${!showStatus ? 'bg-white text-navy-500' : isCorrect ? 'bg-emerald-200 text-emerald-900' : isSelected ? 'bg-rose-200 text-rose-900' : 'bg-gray-100 text-gray-400'}`}>
                                            {String.fromCharCode(65 + idx)}
                                        </span>
                                        {opt}
                                    </span>
                                    {showStatus && isCorrect && <Icons.Check className="text-emerald-600" size={24} />}
                                    {showStatus && isSelected && !isCorrect && <Icons.X className="text-rose-600" size={24} />}
                                </button>
                            );
                        })}
                    </div>

                    {showExplanation && (
                        <div className="mt-8 p-6 bg-white/80 rounded-2xl border-l-4 border-gold-500 shadow-sm animate-fade-in-up relative z-10">
                            <div className="flex items-start gap-4">
                                <Icons.Lightbulb className="text-gold-500 flex-shrink-0 mt-1" />
                                <div className="w-full">
                                    <h4 className="text-navy-900 font-bold mb-2 uppercase tracking-widest text-xs">Explanation</h4>
                                    <p className="text-gray-700 mb-6 leading-relaxed">{q.explanation}</p>
                                    <Button onClick={nextQuestion} variant="secondary" className="w-full sm:w-auto ml-auto" icon={Icons.ChevronRight}>Continue</Button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // 4.4 Speech Simulator (Pressure Test)
        const SpeechSimulator = ({ prompts }) => {
            const [isActive, setIsActive] = useState(false);
            const [time, setTime] = useState(45);
            const [currentPrompt, setCurrentPrompt] = useState(prompts[0]);
            
            const radius = 80;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (time / 45) * circumference;

            useEffect(() => {
                let interval = null;
                if (isActive && time > 0) {
                    interval = setInterval(() => {
                        setTime(t => {
                            if (t <= 5 && t > 1) playSound('tick');
                            if (t === 1) playSound('wrong'); 
                            return t - 1;
                        });
                    }, 1000);
                } else if (time === 0) setIsActive(false);
                return () => clearInterval(interval);
            }, [isActive, time]);

            const startSimulation = () => {
                let nextPrompt;
                do { nextPrompt = prompts[Math.floor(Math.random() * prompts.length)]; } 
                while(nextPrompt === currentPrompt && prompts.length > 1);
                setCurrentPrompt(nextPrompt); setTime(45); setIsActive(true);
            };

            return (
                <div className="bg-gradient-to-br from-navy-900 to-navy-800 text-white p-10 md:p-16 rounded-[3rem] shadow-2xl flex flex-col items-center text-center relative overflow-hidden w-full max-w-4xl mx-auto border-t-8 border-jewel-emerald">
                    <div className="absolute top-0 right-0 w-96 h-96 bg-jewel-emerald rounded-full opacity-10 blur-3xl transform translate-x-1/3 -translate-y-1/3"></div>
                    <div className="absolute bottom-0 left-0 w-96 h-96 bg-jewel-sapphire rounded-full opacity-10 blur-3xl transform -translate-x-1/3 translate-y-1/3"></div>
                    
                    <Icons.Mic size={64} className="text-jewel-emerald mb-8 animate-float drop-shadow-lg" />
                    <Badge color="emerald">Live Interview Simulator</Badge>
                    
                    <p className="text-3xl md:text-5xl font-light mt-8 mb-16 min-h-[140px] flex items-center justify-center leading-tight tracking-tight relative z-10 drop-shadow-sm">
                        "{currentPrompt}"
                    </p>
                    
                    <div className="relative w-64 h-64 mb-16 flex items-center justify-center">
                        <svg className="absolute top-0 left-0 w-full h-full drop-shadow-2xl" viewBox="0 0 180 180">
                            <circle cx="90" cy="90" r={radius} stroke="rgba(255,255,255,0.05)" strokeWidth="12" fill="none" />
                            <circle 
                                className="progress-ring__circle" cx="90" cy="90" r={radius} 
                                stroke={time <= 10 ? '#e11d48' : '#10b981'} strokeWidth="12" fill="none" 
                                strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} strokeLinecap="round"
                            />
                        </svg>
                        <div className="flex flex-col items-center">
                            <span className="text-7xl font-extrabold font-mono tracking-tighter" style={{ color: time <= 10 ? '#e11d48' : 'white' }}>{time}</span>
                            <span className="text-sm text-gray-400 uppercase tracking-widest mt-2 font-bold">Seconds</span>
                        </div>
                    </div>

                    <div className="h-20 flex items-center justify-center relative z-10 w-full">
                        {!isActive && time === 45 && <Button onClick={startSimulation} variant="primary" icon={Icons.Play} className="w-full md:w-auto px-12 py-5 text-xl rounded-full bg-gradient-to-r from-jewel-emerald to-green-600 hover:from-green-500 hover:to-emerald-400 text-white border-none">Start Timer</Button>}
                        {!isActive && time === 0 && <Button onClick={startSimulation} variant="outline" icon={Icons.Refresh} className="w-full md:w-auto px-10 py-5 bg-white/10 text-white border-white/20 hover:bg-white/20 rounded-full">New Question</Button>}
                        {isActive && (
                            <div className="flex items-center gap-4 text-emerald-400 font-bold text-xl animate-pulse bg-emerald-900/40 px-8 py-4 rounded-full border border-emerald-500/30">
                                <div className="w-4 h-4 bg-red-500 rounded-full animate-ping"></div> Speak Confidently Now
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // =====================================================================

        const MASTERCLASS_DATA = [
            {

                title: "The Jet-Set Life & Stage Slang",

                        <Button 
                            onClick={nextSlide}
                            disabled={currentSlide === MASTERCLASS_DATA.length - 1}
                            variant="primary"
                            className="px-6 md:px-10 py-4 text-lg shadow-xl"
                        >
                            <span className="hidden md:inline">Continue</span> <Icons.ChevronRight size={24} />
                        </Button>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
