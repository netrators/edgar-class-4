<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VIP Travel & Backstage Slang - Premium English B1 Masterclass">
    <title>Masterclass Premium: VIP Travel & Backstage Slang</title>
    
    <!-- Tailwind CSS (CDN Script for advanced configuration) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { 50: '#e6e9ef', 100: '#b0b9cb', 200: '#8b9bb4', 300: '#657d9c', 400: '#486283', 500: '#2a4365', 600: '#233855', 700: '#1b2d44', 800: '#112240', 900: '#0A192F' },
                        gold: { 50: '#fcfaf7', 100: '#f9f6f0', 200: '#f0e8d9', 300: '#e6d5b8', 400: '#d4bd94', 500: '#C5A880', 600: '#b39162', 700: '#9b8464', 800: '#826f55', 900: '#6a5a46' }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in-down': 'fadeInDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in-left': 'fadeInLeft 0.5s ease-out forwards',
                        'fade-in-right': 'fadeInRight 0.5s ease-out forwards',
                        'shake': 'shake 0.5s ease-in-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 4s ease-in-out infinite',
                        'spin-slow': 'spin 8s linear infinite',
                        'bounce-slight': 'bounceSlight 2s infinite',
                        'fly': 'fly 6s linear infinite'
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(40px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeInDown: {
                            '0%': { opacity: '0', transform: 'translateY(-40px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeInLeft: {
                            '0%': { opacity: '0', transform: 'translateX(-40px)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },
                        },
                        fadeInRight: {
                            '0%': { opacity: '0', transform: 'translateX(40px)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },
                        },
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '20%, 60%': { transform: 'translateX(-8px)' },
                            '40%, 80%': { transform: 'translateX(8px)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        },
                        bounceSlight: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        },
                        fly: {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '25%': { transform: 'translate(10px, -10px) rotate(5deg)' },
                            '50%': { transform: 'translate(20px, 0) rotate(0deg)' },
                            '75%': { transform: 'translate(10px, 10px) rotate(-5deg)' },
                            '100%': { transform: 'translate(0, 0) rotate(0deg)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- React & ReactDOM (Production Minified) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (In-browser JSX compilation) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Base Styles & Typography Overrides */
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f8f9fa; 
            overflow: hidden; /* Prevent body scroll, handle inside app container (100dvh) */
        }
        
        /* 3D Transform Utilities for Flashcards */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        /* Elegant Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4bd94; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #b39162; }

        /* SVG Circular Timer Styles */
        .progress-ring__circle {
            transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* Dotted Background Pattern */
        .bg-dot-pattern {
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .glass-panel-dark {
            background: rgba(10, 25, 47, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Input specific styles for Fill in the Blanks */
        .fib-input {
            width: 140px;
            transition: all 0.3s ease;
        }
        .fib-input:focus {
            width: 160px;
            outline: none;
            border-bottom-color: #C5A880;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // =====================================================================
        // 1. AUDIO SYSTEM (Web Audio API Synthesizer & TTS)
        // =====================================================================
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const playSound = (type) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            switch(type) {
                case 'correct':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.exponentialRampToValueAtTime(1046.50, now + 0.1); // C6
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'wrong':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
                case 'tick':
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(800, now);
                    gainNode.gain.setValueAtTime(0.1, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now);
                    osc.stop(now + 0.05);
                    break;
                case 'fanfare':
                    [523.25, 659.25, 783.99].forEach(freq => { 
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.type = 'square';
                        o.frequency.setValueAtTime(freq, now);
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        g.gain.setValueAtTime(0.1, now);
                        g.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
                        o.start(now);
                        o.stop(now + 1.5);
                    });
                    break;
            }
        };

        const speakText = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; // B1 friendly speed
                
                const voices = window.speechSynthesis.getVoices();
                const englishVoice = voices.find(v => v.lang.includes('en-US') && v.name.includes('Female')) 
                                  || voices.find(v => v.lang.includes('en-GB') && v.name.includes('Female'))
                                  || voices.find(v => v.lang.includes('en'));
                if (englishVoice) utterance.voice = englishVoice;
                
                window.speechSynthesis.speak(utterance);
            } else {
                console.warn("Speech Synthesis not supported in this browser.");
            }
        };

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        // =====================================================================
        // 2. SVG ICON LIBRARY (Zero External Dependencies)
        // =====================================================================

        const Icons = {
            Volume: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>,
            Check: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>,
            X: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Menu: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>,
            Mic: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x1="12" y1="19" y2="22"></line></svg>,
            ChevronRight: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>,
            ChevronLeft: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>,
            Star: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>,
            Refresh: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>,
            Play: ({ size=20, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
            Award: ({ size=40, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>,
            Globe: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>,
            Heart: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>,
            User: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Message: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>,
            Lock: ({ size=16, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
            BookOpen: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
            Lightbulb: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>,
            Plane: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.7l-1.2 3.6c-.2.5.1 1.1.6 1.2l6.2 1.8L7.5 15l-3.3-.6c-.4-.1-.8.1-1 .5l-1 2c-.2.4 0 .9.4 1l4.9 1.6 1.6 4.9c.1.4.6.6 1 .4l2-1c.4-.2.6-.6.5-1l-.6-3.3 1.5-1.8 1.8 6.2c.1.5.7.8 1.2.6l3.6-1.2c.5-.2.8-.6.7-1.1z"></path></svg>,
            MapPin: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>,
            Briefcase: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>,
            Smile: ({ size=24, className="" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" x1="9.01" y1="9" y2="9"></line><line x1="15" x1="15.01" y1="9" y2="9"></line></svg>
        };

        // =====================================================================
        // 3. REUSABLE UI COMPONENTS
        // =====================================================================

        const TTSButton = ({ text, className="", title="Listen to pronunciation" }) => (
            <button 
                onClick={(e) => { e.stopPropagation(); speakText(text); }}
                className={`p-2 rounded-full transition-all duration-300 hover:scale-110 active:scale-95 flex-shrink-0 ${className}`}
                title={title}
                aria-label={title}
            >
                <Icons.Volume size={18} />
            </button>
        );

        const Chunk = ({ type, children }) => {
            const styles = {
                modal: "bg-blue-100 text-blue-800 border-blue-300",
                verb: "bg-green-100 text-green-800 border-green-300",
                slang: "bg-orange-100 text-orange-800 border-orange-300",
                noun: "bg-purple-100 text-purple-800 border-purple-300",
                aux: "bg-pink-100 text-pink-800 border-pink-300"
            };
            return (
                <span className={`inline-block px-2 py-1 mx-1 rounded-md font-bold border ${styles[type]} shadow-sm transition-transform hover:-translate-y-1`}>
                    {children}
                </span>
            );
        };

        const Button = ({ children, onClick, disabled, variant='primary', className="", icon: Icon }) => {
            const base = "flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold transition-all duration-300 shadow-sm active:scale-95 disabled:opacity-50 disabled:pointer-events-none";
            const variants = {
                primary: "bg-navy-900 text-white hover:bg-navy-800 hover:shadow-lg hover:-translate-y-0.5 border border-transparent",
                secondary: "bg-gold-500 text-navy-900 hover:bg-gold-400 hover:shadow-lg border border-transparent",
                outline: "border-2 border-navy-900 text-navy-900 hover:bg-navy-50",
                ghost: "bg-transparent text-gray-600 shadow-none hover:bg-gray-100 hover:text-navy-900",
                danger: "bg-red-500 text-white hover:bg-red-600 hover:shadow-lg"
            };
            return (
                <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>
                    {children}
                    {Icon && <Icon size={20} />}
                </button>
            );
        };

        const Badge = ({ children, color="navy" }) => {
            const colors = {
                navy: "bg-navy-100 text-navy-800 border-navy-200",
                gold: "bg-gold-100 text-gold-800 border-gold-200",
                green: "bg-green-100 text-green-800 border-green-200",
                orange: "bg-orange-100 text-orange-800 border-orange-200"
            };
            return (
                <span className={`inline-flex items-center px-3 py-1 rounded-full text-xs font-bold tracking-widest uppercase border ${colors[color]}`}>
                    {children}
                </span>
            );
        };

        // =====================================================================
        // 4. INTERACTIVE ACTIVITY COMPONENTS
        // =====================================================================

        // 4.1 3D Flashcards Deck
        const FlashcardDeck = ({ cards, deckName }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const nextCard = () => { 
                setIsFlipped(false); 
                setTimeout(() => setCurrentIndex(p => (p + 1) % cards.length), 150); 
            };
            const prevCard = () => { 
                setIsFlipped(false); 
                setTimeout(() => setCurrentIndex(p => (p === 0 ? cards.length - 1 : p - 1)), 150); 
            };

            const card = cards[currentIndex];

            return (
                <div className="w-full max-w-md mx-auto flex flex-col items-center">
                    <div className="flex justify-between w-full items-center mb-6">
                        <Badge color="gold">{deckName}</Badge>
                        <span className="text-gray-400 font-bold text-sm">Card {currentIndex + 1} of {cards.length}</span>
                    </div>
                    
                    <div 
                        className="relative w-full h-80 perspective-1000 cursor-pointer group"
                        onClick={() => setIsFlipped(!isFlipped)}
                    >
                        <div className={`w-full h-full absolute transition-all duration-700 transform-style-3d shadow-2xl rounded-2xl ${isFlipped ? 'rotate-y-180' : ''}`}>
                            
                            {/* Front */}
                            <div className="absolute w-full h-full backface-hidden bg-white rounded-2xl border-b-8 border-navy-900 flex flex-col items-center justify-center p-8 text-center group-hover:border-gold-500 transition-colors">
                                <TTSButton text={card.term} className="absolute top-4 right-4 bg-navy-50 text-navy-900" />
                                {card.icon && <card.icon size={48} className="text-gold-500 mb-6 opacity-80" />}
                                <h3 className="text-4xl font-extrabold text-navy-900 mb-2">{card.term}</h3>
                                <p className="text-gray-400 text-sm mt-4 font-medium tracking-wide">TAP TO FLIP</p>
                            </div>

                            {/* Back */}
                            <div className="absolute w-full h-full backface-hidden bg-navy-900 rounded-2xl rotate-y-180 flex flex-col items-center justify-center p-8 text-center text-white border-b-8 border-gold-500">
                                <h4 className="text-gold-500 font-bold uppercase tracking-widest mb-2 text-xs opacity-80">Meaning</h4>
                                <p className="text-xl mb-6 font-light leading-snug">{card.def}</p>
                                <div className="bg-white/10 p-4 rounded-xl w-full border border-white/5">
                                    <h4 className="text-gold-300 font-semibold text-xs mb-2 tracking-widest uppercase">Example in Context</h4>
                                    <p className="italic text-gray-200 text-sm leading-relaxed" dangerouslySetInnerHTML={{ __html: card.example }}></p>
                                    <TTSButton text={card.exampleRaw} className="mt-4 text-gold-500 hover:bg-gold-500 hover:text-navy-900 bg-white/5" />
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex gap-4 mt-8 w-full">
                        <Button variant="outline" onClick={prevCard} icon={Icons.ChevronLeft} className="flex-1 justify-center py-4 bg-white border-gray-200 hover:border-navy-900">Prev</Button>
                        <Button variant="primary" onClick={nextCard} className="flex-1 justify-center py-4">Next <Icons.ChevronRight size={20}/></Button>
                    </div>
                </div>
            );
        };

        // 4.2 Dynamic MCQ Quiz
        const QuizMCQ = ({ questions }) => {
            const [currentQ, setCurrentQ] = useState(0);
            const [selected, setSelected] = useState(null);
            const [showExplanation, setShowExplanation] = useState(false);
            const [score, setScore] = useState(0);
            const [isFinished, setIsFinished] = useState(false);

            const handleAnswer = (index) => {
                if (selected !== null) return;
                setSelected(index);
                const isCorrect = index === questions[currentQ].ans;
                
                if (isCorrect) {
                    playSound('correct');
                    setScore(s => s + 1);
                } else {
                    playSound('wrong');
                }
                setShowExplanation(true);
            };

            const nextQuestion = () => {
                if (currentQ < questions.length - 1) {
                    setCurrentQ(c => c + 1);
                    setSelected(null);
                    setShowExplanation(false);
                } else {
                    playSound('fanfare');
                    setIsFinished(true);
                }
            };

            const reset = () => {
                setCurrentQ(0); setSelected(null); setShowExplanation(false); setScore(0); setIsFinished(false);
            };

            if (isFinished) {
                const percentage = (score / questions.length) * 100;
                return (
                    <div className="glass-panel p-10 rounded-3xl shadow-xl text-center border-t-8 border-gold-500 animate-fade-in-up">

                        {percentage === 100 ? (

                );
            }

            const q = questions[currentQ];

            return (
                <div className="bg-white p-8 md:p-10 rounded-3xl shadow-xl animate-fade-in-right border border-gray-100">
                    <div className="flex justify-between items-center mb-8 border-b border-gray-100 pb-4">
                        <Badge color="navy">Question {currentQ + 1} of {questions.length}</Badge>
                        <span className="font-bold text-gray-400">Score: {score}</span>
                    </div>
                    
                    <h3 className="text-2xl md:text-3xl font-bold text-navy-900 mb-8 leading-tight">{q.text}</h3>
                    
                    <div className="space-y-4">
                        {q.options.map((opt, idx) => {
                            const isSelected = selected === idx;
                            const isCorrect = q.ans === idx;
                            const showStatus = selected !== null;
                            
                            let btnClass = "w-full p-5 rounded-xl border-2 text-left font-bold text-lg flex items-center justify-between transition-all duration-300 focus:outline-none ";
                            
                            if (!showStatus) {
                                btnClass += "border-gray-200 text-navy-800 hover:border-gold-500 hover:bg-gold-50 hover:-translate-y-1 shadow-sm";
                            } else if (isCorrect) {
                                btnClass += "border-green-500 bg-green-50 text-green-700 shadow-md transform scale-[1.02]";
                            } else if (isSelected && !isCorrect) {
                                btnClass += "border-red-500 bg-red-50 text-red-700 animate-shake";
                            } else {
                                btnClass += "border-gray-100 text-gray-400 opacity-50";

                            return (
                                <button key={idx} disabled={showStatus} onClick={() => handleAnswer(idx)} className={btnClass}>

                                            {String.fromCharCode(65 + idx)}
                                        </span>
                                        {opt}
                                    </span>
                                    {showStatus && isCorrect && <Icons.Check className="text-green-600" size={24} />}
                                    {showStatus && isSelected && !isCorrect && <Icons.X className="text-red-600" size={24} />}
                                </button>

                    </div>

                    {showExplanation && (
                        <div className="mt-8 p-6 bg-navy-50 rounded-xl border-l-4 border-navy-900 animate-fade-in-up">

                                    <Button onClick={nextQuestion} variant="primary" className="w-full sm:w-auto" icon={Icons.ChevronRight}>Continue</Button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // 4.3 Fill in the Blanks Activity
        const FillInTheBlanks = ({ sentences }) => {
            const parseSentence = (str) => {
                const parts = [];
                let current = "";
                let inBracket = false;
                for(let i=0; i<str.length; i++) {
                    if (str[i] === '{') {
                        if (current) parts.push({ type: 'text', value: current });
                        current = "";
                        inBracket = true;
                    } else if (str[i] === '}') {
                        parts.push({ type: 'input', answer: current.toLowerCase() });
                        current = "";
                        inBracket = false;
                    } else {
                        current += str[i];
                    }
                }
                if (current) parts.push({ type: 'text', value: current });
                return parts;
            };

            const [inputs, setInputs] = useState({});
            const [status, setStatus] = useState({});

            const handleChange = (id, val) => {
                setInputs(prev => ({ ...prev, [id]: val }));
                setStatus(prev => ({ ...prev, [id]: null })); 
            };

            const checkAnswers = () => {
                let allCorrect = true;
                const newStatus = {};
                sentences.forEach((s, sIdx) => {
                    const parts = parseSentence(s);
                    parts.forEach((p, pIdx) => {
                        if (p.type === 'input') {
                            const id = `${sIdx}-${pIdx}`;
                            const userVal = (inputs[id] || "").trim().toLowerCase();
                            if (userVal === p.answer) {
                                newStatus[id] = 'correct';
                            } else {
                                newStatus[id] = 'wrong';
                                allCorrect = false;
                            }
                        }
                    });
                });
                
                setStatus(newStatus);
                if (allCorrect) playSound('correct');
                else playSound('wrong');
            };

            return (
                <div className="bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-gray-100 animate-fade-in-up">
                    <p className="text-gray-500 mb-8 italic">Type the missing words in the blanks to complete this VIP travel diary. Pay attention to context!</p>
                    
                    <div className="space-y-8 mb-8">
                        {sentences.map((sentence, sIdx) => {
                            const parts = parseSentence(sentence);
                            return (
                                <div key={sIdx} className="text-xl md:text-2xl leading-loose text-navy-900 font-light">
                                    {parts.map((part, pIdx) => {
                                        if (part.type === 'text') return <span key={pIdx}>{part.value}</span>;
                                        
                                        const id = `${sIdx}-${pIdx}`;
                                        const stat = status[id];
                                        let inputClass = "fib-input mx-2 bg-transparent border-b-2 text-center font-bold text-gold-600 focus:text-navy-900 placeholder-gray-300 ";
                                        
                                        if (stat === 'correct') inputClass += "border-green-500 text-green-600 bg-green-50 rounded-t-md";
                                        else if (stat === 'wrong') inputClass += "border-red-500 text-red-600 bg-red-50 rounded-t-md animate-shake";
                                        else inputClass += "border-gray-300";

                                        return (
                                            <input 
                                                key={pIdx}
                                                type="text"
                                                className={inputClass}
                                                value={inputs[id] || ""}
                                                onChange={(e) => handleChange(id, e.target.value)}
                                                placeholder="..."
                                                autoComplete="off"
                                                spellCheck="false"
                                            />
                                        );
                                    })}
                                </div>
                            );
                        })}
                    </div>
                    
                    <div className="flex justify-end pt-6 border-t border-gray-100">
                        <Button onClick={checkAnswers} variant="primary" icon={Icons.Check}>Check Answers</Button>
                    </div>
                </div>
            );
        };

        // 4.4 Matching Game
        const MatchingGame = ({ leftItems, rightItems, successMsg }) => {
            const [selectedLeft, setSelectedLeft] = useState(null);
            const [matches, setMatches] = useState([]);
            const [errorState, setErrorState] = useState(false);

            const handleLeftClick = (id) => {
                if (!matches.includes(id)) {
                    setSelectedLeft(id);
                    playSound('tick');
                }
            };

            const handleRightClick = (id) => {
                if (!selectedLeft || matches.includes(id)) return;
                
                if (selectedLeft === id) {
                    setMatches([...matches, id]);
                    setSelectedLeft(null);
                    playSound('correct');
                } else {
                    setErrorState(true);
                    playSound('wrong');
                    setTimeout(() => setErrorState(false), 500);
                }
            };

            const isAllMatched = matches.length === leftItems.length;

            return (
                <div className="w-full">
                    {isAllMatched && (
                        <div className="bg-green-100 text-green-800 p-4 rounded-xl mb-6 font-bold flex items-center justify-center gap-2 animate-fade-in-down">
                            <Icons.Award /> {successMsg}
                        </div>
                    )}
                    <div className="flex flex-col md:flex-row gap-8 justify-center items-stretch">
                        
                        <div className="flex-1 flex flex-col gap-4">
                            <h4 className="text-center text-gold-600 font-bold mb-2 uppercase tracking-widest text-sm flex items-center justify-center gap-2"><Icons.User size={18}/> Situation</h4>
                            {leftItems.map(item => {
                                const isMatched = matches.includes(item.id);
                                const isSelected = selectedLeft === item.id;
                                return (
                                    <div key={item.id} onClick={() => handleLeftClick(item.id)}
                                        className={`p-5 rounded-xl border-2 cursor-pointer transition-all duration-300 flex items-center justify-between font-medium

                                            isSelected ? 'bg-navy-900 border-navy-900 text-white shadow-lg scale-105' : 
                                            errorState && isSelected ? 'bg-red-50 border-red-500 text-red-700 animate-shake' : 
                                            'bg-white border-gray-200 text-gray-700 hover:border-gold-500 shadow-sm hover:shadow-md'}`}
                                    >
                                        {item.text}
                                        {isMatched && <Icons.Check />}
                                    </div>
                                );
                            })}
                        </div>
                        
                        <div className="flex-1 flex flex-col gap-4">
                            <h4 className="text-center text-gold-600 font-bold mb-2 uppercase tracking-widest text-sm flex items-center justify-center gap-2"><Icons.Message size={18}/> Perfect Phrase</h4>
                            {rightItems.map((item, idx) => {
                                const isMatched = matches.includes(item.id);
                                return (
                                    <div key={idx} onClick={() => handleRightClick(item.id)}

                                            ${isMatched ? 'bg-green-500 border-green-500 text-white opacity-50 scale-95' : 
                                            'bg-white border-gray-200 text-navy-900 font-medium hover:border-navy-900 shadow-sm hover:shadow-md'}`}
                                    >
                                        <span className="italic">{item.text}</span>
                                        {!isMatched && <TTSButton text={item.text} className="ml-2 scale-90 bg-gray-50 text-gray-400 hover:text-navy-900" />}
                                        {isMatched && <Icons.Check />}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // 4.5 Speech Simulator (SVG Timer)
        const SpeechSimulator = ({ prompts }) => {
            const [isActive, setIsActive] = useState(false);
            const [time, setTime] = useState(45);
            const [currentPrompt, setCurrentPrompt] = useState(prompts[0]);
            
            const radius = 70;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (time / 45) * circumference;

            useEffect(() => {
                let interval = null;
                if (isActive && time > 0) {
                    interval = setInterval(() => {
                        setTime(t => {
                            if (t <= 5 && t > 1) playSound('tick');
                            if (t === 1) playSound('wrong'); 
                            return t - 1;
                        });
                    }, 1000);
                } else if (time === 0) {
                    setIsActive(false);
                }
                return () => clearInterval(interval);
            }, [isActive, time]);

            const startSimulation = () => {
                let nextPrompt;
                do {
                    nextPrompt = prompts[Math.floor(Math.random() * prompts.length)];
                } while(nextPrompt === currentPrompt && prompts.length > 1);
                
                setCurrentPrompt(nextPrompt);
                setTime(45);
                setIsActive(true);
            };

            return (
                <div className="glass-panel-dark text-white p-10 md:p-14 rounded-[3rem] shadow-2xl flex flex-col items-center text-center relative overflow-hidden w-full max-w-3xl mx-auto border-t-8 border-gold-500">
                    <div className="absolute top-0 right-0 w-96 h-96 bg-gold-500 rounded-full opacity-10 blur-3xl transform translate-x-1/2 -translate-y-1/2"></div>
                    
                    <Icons.Mic size={56} className="text-gold-500 mb-8 animate-pulse-slow" />
                    
                    <h3 className="text-gold-500 font-bold tracking-widest uppercase text-sm mb-6 flex items-center gap-2">
                        <Icons.User size={16}/> Interview Question
                    </h3>
                    
                    <p className="text-3xl md:text-4xl font-light mb-12 min-h-[120px] flex items-center justify-center leading-tight">
                        "{currentPrompt}"
                    </p>
                    
                    <div className="relative w-56 h-56 mb-12 flex items-center justify-center">
                        <svg className="absolute top-0 left-0 w-full h-full drop-shadow-lg" viewBox="0 0 160 160">
                            <circle cx="80" cy="80" r={radius} stroke="rgba(255,255,255,0.1)" strokeWidth="10" fill="none" />
                            <circle 
                                className="progress-ring__circle" 
                                cx="80" cy="80" r={radius} 
                                stroke={time <= 10 ? '#ef4444' : '#C5A880'} 
                                strokeWidth="10" fill="none" 
                                strokeDasharray={circumference} 
                                strokeDashoffset={strokeDashoffset} 
                                strokeLinecap="round"
                            />
                        </svg>
                        <div className="flex flex-col items-center">
                            <span className="text-6xl font-bold font-mono tracking-tighter" style={{ color: time <= 10 ? '#ef4444' : 'white' }}>
                                {time}
                            </span>
                            <span className="text-sm text-gray-400 uppercase tracking-widest mt-1">SEC</span>
                        </div>
                    </div>

                    <div className="h-16 flex items-center justify-center">
                        {!isActive && time === 45 && (
                            <Button onClick={startSimulation} variant="secondary" icon={Icons.Play} className="px-10 py-5 text-xl rounded-full">Start 45s Timer</Button>
                        )}
                        {!isActive && time === 0 && (
                            <Button onClick={startSimulation} variant="primary" icon={Icons.Refresh} className="px-8 py-4 bg-white text-navy-900 hover:bg-gray-100 rounded-full">Draw New Question</Button>
                        )}
                        {isActive && (
                            <div className="flex items-center gap-3 text-gold-400 font-bold text-lg animate-pulse bg-gold-900/30 px-6 py-3 rounded-full border border-gold-500/30">
                                <div className="w-3 h-3 bg-red-500 rounded-full animate-ping"></div> Speak Loudly & Clearly
                            </div>
                        )}
                    </div>
                </div>

        };

        // 4.6 Confetti Component

            return (
                <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                    {particles.map(p => (
                        <div key={p.id} className="absolute rounded-sm opacity-90 shadow-sm"
                            style={{

                        <QuizMCQ questions={[
                            { 
                                text: "You need help with your bags. What is the most polite way to ask?", 
                                options: ["I want you to help me.", "Would you mind helping me?", "Help me with this."], ans: 1, 
                                explanation: "'Would you mind + verb-ing' is the most elegant and polite way to request help."
                            },
                            { 
                                text: "The interviewer asks: 'Have you been to Mexico before?' You answer:", 
                                options: ["Yes, I went yesterday.", "Yes, I have visited Mexico twice.", "Yes, I visit Mexico."], ans: 1, 
                                explanation: "To talk about general life experiences without a specific finished time, we use Present Perfect ('I have visited')."
                            },
                            { 
                                text: "The hotel gave us free water in the room. The water is:", 
                                options: ["Complimentary", "Itinerary", "Layover"], ans: 0, 
                                explanation: "'Complimentary' means given free of charge as a courtesy."
                            }
                        ]} />
                    </div>
                ),
                note: "Ensure they understand WHY 'I want' sounds rude in English compared to Spanish 'Quiero'. English relies heavily on indirect polite structures."
            },
            {
                id: 'slang-intro',
                title: "What is 'Elegant Slang'?",
                subtitle: "Backstage Culture",
                content: () => (
                    <div className="w-full max-w-5xl mx-auto animate-fade-in-up">
                        <div className="glass-panel p-10 md:p-14 rounded-[3rem] shadow-2xl relative overflow-hidden border-t-8 border-gold-500 text-center">
                            <Icons.Sparkles size={80} className="text-gold-500 mx-auto mb-6" />
                            <h3 className="text-3xl font-bold text-navy-900 mb-6">Sounding Natural Behind the Scenes</h3>
                            <p className="text-xl text-gray-700 mb-8 max-w-2xl mx-auto leading-relaxed">
                                You use formal English on stage. But when you are resting with the makeup artists, directors, and other girls, you need to use <strong>Idioms</strong> (elegant slang) to sound friendly and natural.
                            </p>
                            <div className="bg-navy-50 p-6 rounded-2xl inline-block border border-navy-100">
                                <span className="block text-sm font-bold text-navy-400 uppercase tracking-widest mb-2">Formal vs Natural</span>
                                <div className="text-lg">
                                    <span className="text-red-500 line-through mr-4">"You did that perfectly."</span>
                                    <Icons.ChevronRight className="inline text-gray-400 mx-2"/>
                                    <strong className="text-green-600">"You nailed it!"</strong>
                                </div>
                            </div>
                        </div>
                    </div>
                ),
                note: "Clarify that 'slang' doesn't mean bad words. It means colloquial, native-like expressions (Idioms) that build teamwork and friendship backstage."
            },
            {
                id: 'vocab-slang',
                title: "Backstage Expressions",
                subtitle: "Flashcards: Elegant Slang",
                content: () => (
                    <div className="w-full animate-fade-in-up">
                        <p className="text-center text-xl text-gray-600 mb-10 max-w-2xl mx-auto">Learn these common phrases to chat with the crew and other candidates.</p>
                        <FlashcardDeck deckName="Module 7: Backstage Slang" cards={[
                            { term: "Nailed it", icon: Icons.Star, def: "To do something perfectly or successfully.", example: "You <span class='text-orange-400 font-bold'>nailed it</span> during the interview portion!", exampleRaw: "You nailed it during the interview portion!" },
                            { term: "On point", icon: Icons.Check, def: "Perfect, flawless, exactly right.", example: "Your makeup and hair are absolutely <span class='text-orange-400 font-bold'>on point</span> today.", exampleRaw: "Your makeup and hair are absolutely on point today." },
                            { term: "A breeze", icon: Icons.Smile, def: "Something that is very easy to do.", example: "Don't worry about the choreography, it's <span class='text-orange-400 font-bold'>a breeze</span>.", exampleRaw: "Don't worry about the choreography, it's a breeze." },
                            { term: "Keep your cool", icon: Icons.Heart, def: "To stay calm in a stressful situation.", example: "Even when the music stopped, you managed to <span class='text-orange-400 font-bold'>keep your cool</span>.", exampleRaw: "Even when the music stopped, you managed to keep your cool." },
                            { term: "Behind the scenes", icon: Icons.User, def: "Things that happen secretly or away from the public eye.", example: "It's very chaotic <span class='text-orange-400 font-bold'>behind the scenes</span> before the show.", exampleRaw: "It's very chaotic behind the scenes before the show." }
                        ]} />
                    </div>
                ),
                note: "Practice using these! Ask the student: 'How was your English class today?' and prompt them to say 'It was a breeze!' or 'I nailed it!'."
            },
            {
                id: 'slang-match',
                title: "Social Interactions",
                subtitle: "Matching Game",
                content: () => (
                    <div className="w-full max-w-5xl mx-auto animate-fade-in-up">
                        <div className="bg-white p-8 md:p-12 rounded-[2rem] shadow-xl border border-gray-100">
                            <p className="text-center text-xl text-gray-600 mb-10 max-w-2xl mx-auto leading-relaxed">
                                Match the backstage situation on the left with the natural "slang" response on the right.
                            </p>
                            <MatchingGame 
                                successMsg="Perfect Natural Responses!"
                                leftItems={[
                                    { id: '1', text: "Your friend just finished a great speech." },
                                    { id: '2', text: "Looking at a beautiful evening gown." },
                                    { id: '3', text: "Someone is nervous about the walk." },
                                    { id: '4', text: "The microphone broke, but she didn't panic." }
                                ]}
                                rightItems={[
                                    { id: '4', text: "\"Wow, she really kept her cool.\"" },
                                    { id: '1', text: "\"Congratulations, you nailed it!\"" },
                                    { id: '2', text: "\"That dress is completely on point.\"" },
                                    { id: '3', text: "\"Don't worry, it's a breeze.\"" }
                                ]}
                            />
                        </div>
                    </div>
                ),
                note: "This activity tests pragmatics: knowing WHEN to use the slang. Discuss why each response fits the situation perfectly."
            },
            {
                id: 'polite-refusal',
                title: "The Elegant Refusal",
                subtitle: "Advanced Networking",
                content: () => (
                    <div className="w-full max-w-4xl mx-auto animate-fade-in-up">
                        <div className="bg-navy-900 text-white p-10 rounded-[2rem] shadow-xl relative overflow-hidden">
                            <Icons.Lock className="absolute top-8 right-8 text-gold-500 opacity-20" size={120} />
                            
                            <h3 className="text-3xl font-bold text-gold-500 mb-6 relative z-10">How to Say "No" Politely</h3>
                            <p className="text-xl text-gray-300 mb-8 relative z-10 leading-relaxed">
                                Traveling VIPs often have to decline invitations or offers. A simple "No" is too direct. Use this elegant formula: <br/><strong className="text-white">Gratitude + Soft Refusal + Reason (optional)</strong>.
                            </p>
                            
                            <div className="space-y-6 relative z-10">
                                <div className="bg-white/10 p-6 rounded-2xl border border-white/20">
                                    <h4 className="font-bold text-gold-400 mb-2 text-sm tracking-widest uppercase">Declining Food/Drinks</h4>
                                    <div className="flex items-center gap-4 text-xl">
                                        <TTSButton text="That looks wonderful, but I am perfectly fine for now, thank you." className="bg-gold-500 text-navy-900" />
                                        <span className="font-light">"That looks wonderful, but I am <strong className="text-gold-500">perfectly fine for now</strong>, thank you."</span>
                                    </div>
                                </div>
                                
                                <div className="bg-white/10 p-6 rounded-2xl border border-white/20">
                                    <h4 className="font-bold text-gold-400 mb-2 text-sm tracking-widest uppercase">Declining an Invitation</h4>
                                    <div className="flex items-center gap-4 text-xl">
                                        <TTSButton text="I would love to join you, but unfortunately I have an early start tomorrow." className="bg-gold-500 text-navy-900" />
                                        <span className="font-light">"I <strong className="text-gold-500">would love to</strong> join you, but unfortunately I have an early start tomorrow."</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                ),
                note: "Crucial life skill for pageants! Roleplay this. Offer the student a glass of champagne or an invitation to a late-night party, and have them use these exact formulas to decline elegantly."
            },
            {
                id: 'fill-blanks-travel',
                title: "The VIP Diary",
                subtitle: "Contextual Practice",
                content: () => (
                    <div className="w-full max-w-4xl mx-auto">
                        <FillInTheBlanks sentences={[
                            "We had a long {layover} in Paris, but the airport lounge was beautiful.",
                            "The hotel staff has been {so} welcoming to us.",
                            "I was nervous, but the interview was a {breeze}.",
                            "My makeup artist is amazing; my look is completely on {point}."
                        ]} />
                    </div>
                ),
                note: "This mixes the travel vocab, grammar (so/such), and slang. Remind the student to read the full sentence to get the context before typing."
            },
            {
                id: 'speech-sim-travel',
                title: "Under Pressure",
                subtitle: "Speech Simulator",
                content: () => (
                    <div className="w-full animate-fade-in-up">
                        <SpeechSimulator prompts={[
                            "Tell us about the most beautiful country you have visited.",
                            "What happens behind the scenes right before you go on stage?",
                            "How do you keep your cool when things go wrong during travel?",
                            "Describe an unforgettable experience you've had in this competition.",
                            "If you could change one thing about your itinerary, what would it be?"
                        ]} />
                    </div>
                ),
                note: "Final Challenge! The student must press start and speak for 45 seconds. Encourage them to use Present Perfect ('I have visited...'), Slang ('Behind the scenes'), or Polite structures."
            },
            {
                id: 'graduation-travel',
                title: "Global VIP Certified",
                subtitle: "Masterclass Complete",
                content: () => (
                    <div className="text-center animate-fade-in-up bg-white p-10 md:p-16 rounded-[3rem] shadow-2xl border border-gray-100 relative overflow-hidden max-w-3xl mx-auto">
                        <Confetti />
                        <div className="absolute top-0 left-0 w-full h-4 bg-gradient-to-r from-gold-300 via-gold-500 to-navy-900"></div>
                        <Icons.Globe size={100} className="mx-auto text-gold-500 mb-8 animate-bounce-slight" />
                        
                        <h2 className="text-5xl font-extrabold text-navy-900 mb-4 tracking-tight">Congratulations!</h2>
                        <p className="text-2xl text-gray-600 mb-10 font-light">You are ready to travel the world and own the backstage.</p>
                        
                        <div className="bg-navy-50 p-8 rounded-3xl text-left border border-navy-100 shadow-inner">
                            <h4 className="font-bold text-navy-900 mb-6 uppercase text-sm tracking-widest flex items-center gap-2">
                                <Icons.Briefcase size={18}/> Your Travel Kit
                            </h4>
                            <ul className="space-y-4 text-gray-800 text-lg font-medium">
                                <li className="flex items-center gap-3"><span className="p-1 bg-green-200 text-green-700 rounded-full"><Icons.Check size={16}/></span> Elegant Requests <em>("Would you mind...")</em></li>
                                <li className="flex items-center gap-3"><span className="p-1 bg-green-200 text-green-700 rounded-full"><Icons.Check size={16}/></span> VIP Vocabulary <em>(Concierge, Itinerary)</em></li>
                                <li className="flex items-center gap-3"><span className="p-1 bg-green-200 text-green-700 rounded-full"><Icons.Check size={16}/></span> Natural Slang <em>("Nailed it", "On point")</em></li>
                                <li className="flex items-center gap-3"><span className="p-1 bg-green-200 text-green-700 rounded-full"><Icons.Check size={16}/></span> The Elegant Refusal <em>("I am perfectly fine...")</em></li>
                            </ul>
                        </div>
                    </div>
                ),
                note: "Amazing job. For homework, have the student write a short Instagram caption (in English) about a recent trip, using at least one slang phrase and one Present Perfect sentence."
            }
        ];

        // =====================================================================
        // 6. MAIN APPLICATION SHELL (Layout, State, Routing)
        // =====================================================================

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const [showNotes, setShowNotes] = useState(false);
            const [showMenu, setShowMenu] = useState(false);
            const [maxUnlocked, setMaxUnlocked] = useState(0);
            const mainRef = useRef(null);

            useEffect(() => {
                const saved = localStorage.getItem('masterclassTravelB1');
                if (saved) {
                    const parsed = parseInt(saved, 10);
                    setMaxUnlocked(parsed);
                    setCurrentSlide(parsed);
                }
            }, []);

            useEffect(() => {
                if (currentSlide > maxUnlocked) {
                    setMaxUnlocked(currentSlide);
                    localStorage.setItem('masterclassTravelB1', currentSlide);
                }
            }, [currentSlide, maxUnlocked]);

            useEffect(() => {
                if (mainRef.current) {
                    mainRef.current.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }, [currentSlide]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight' && currentSlide < MASTERCLASS_DATA.length - 1) nextSlide();
                    if (e.key === 'ArrowLeft' && currentSlide > 0) prevSlide();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [currentSlide]);

            const nextSlide = () => setCurrentSlide(p => Math.min(p + 1, MASTERCLASS_DATA.length - 1));
            const prevSlide = () => setCurrentSlide(p => Math.max(p - 1, 0));
            
            const goToSlide = (idx) => {
                setCurrentSlide(idx);
                setShowMenu(false);
            };

            const slide = MASTERCLASS_DATA[currentSlide];

            return (
                <div className="h-[100dvh] flex flex-col font-sans overflow-hidden bg-[#F8F9FA] text-gray-800">
                    
                    {/* HEADER */}
                    <header className="bg-navy-900 text-white h-[72px] flex items-center justify-between px-4 md:px-8 shadow-md relative z-40">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setShowMenu(!showMenu)} className="p-2 hover:bg-navy-800 rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-gold-500">
                                {showMenu ? <Icons.X size={26} /> : <Icons.Menu size={26} />}
                            </button>
                            <div className="flex items-center gap-2">
                                <Icons.Plane className="text-gold-500 hidden sm:block" size={20}/>
                                <h1 className="font-bold text-lg tracking-wide hidden md:block text-white">VIP Travel Masterclass</h1>
                            </div>
                        </div>
                        
                        <div className="flex-1 max-w-xl mx-8">
                            <div className="bg-navy-800 h-2.5 rounded-full overflow-hidden shadow-inner">
                                <div 
                                    className="bg-gradient-to-r from-gold-600 to-gold-400 h-full transition-all duration-700 ease-out relative"
                                    style={{ width: `${((currentSlide + 1) / MASTERCLASS_DATA.length) * 100}%` }}
                                >
                                    <div className="absolute top-0 right-0 bottom-0 left-0 bg-white/20 animate-pulse-slow"></div>
                                </div>
                            </div>
                        </div>

                        <button 
                            onClick={() => setShowNotes(!showNotes)}
                            className={`px-5 py-2.5 text-sm font-bold rounded-xl transition-all border-2 flex items-center gap-2 ${showNotes ? 'bg-gold-500 text-navy-900 border-gold-500 shadow-md' : 'text-gold-500 border-gold-500 hover:bg-gold-500/10'}`}
                        >
                            <Icons.BookOpen size={18} className={showNotes ? "text-navy-900" : "text-gold-500"} />
                            <span className="hidden sm:inline">{showNotes ? 'Hide Notes' : 'Teacher Notes'}</span>
                        </button>
                    </header>

                    {/* MAIN BODY */}
                    <div className="flex flex-1 relative overflow-hidden">
                        
                        {/* Navigation Drawer Menu */}
                        <div className={`absolute top-0 left-0 h-full w-80 bg-white shadow-2xl z-30 transition-transform duration-300 ease-in-out transform flex flex-col ${showMenu ? 'translate-x-0' : '-translate-x-full'}`}>
                            <div className="p-6 h-full overflow-y-auto bg-gray-50 border-r border-gray-200">
                                <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                                    <Icons.Menu size={16}/> Course Modules
                                </h3>
                                <div className="space-y-3">
                                    {MASTERCLASS_DATA.map((item, idx) => {
                                        const isLocked = idx > maxUnlocked;
                                        const isActive = currentSlide === idx;
                                        return (
                                            <button 
                                                key={item.id}
                                                onClick={() => goToSlide(idx)}
                                                disabled={isLocked}
                                                className={`w-full text-left p-4 rounded-xl text-sm transition-all duration-200 flex items-center gap-3
                                                    ${isActive ? 'bg-navy-900 text-white font-bold shadow-md transform scale-[1.02]' : 
                                                    isLocked ? 'opacity-50 cursor-not-allowed text-gray-400 bg-gray-100 border border-gray-200' : 'hover:bg-white border border-transparent hover:border-gray-200 hover:shadow-sm text-navy-800'}`}
                                            >
                                                <div className={`flex items-center justify-center w-6 h-6 rounded-full text-xs font-bold flex-shrink-0 ${isActive ? 'bg-gold-500 text-navy-900' : isLocked ? 'bg-gray-200 text-gray-500' : 'bg-navy-100 text-navy-900'}`}>
                                                    {isLocked ? <Icons.Lock size={12}/> : idx + 1}
                                                </div>
                                                <span className="truncate flex-1">{item.title}</span>
                                                {!isLocked && !isActive && <Icons.Check size={16} className="text-green-500 flex-shrink-0 opacity-50"/>}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {showMenu && (
                            <div 
                                className="absolute inset-0 bg-navy-900/20 backdrop-blur-sm z-20"
                                onClick={() => setShowMenu(false)}
                            ></div>
                        )}

                        {/* Slide Content Area */}
                        <main ref={mainRef} className="flex-1 overflow-y-auto relative bg-dot-pattern scroll-smooth">
                            <div className="max-w-7xl mx-auto px-4 sm:px-8 py-10 md:py-16 min-h-full flex flex-col relative z-10">
                                
                                <div className="my-auto w-full">
                                    <div className="text-center mb-12 md:mb-16 animate-fade-in-down">
                                        <span className="inline-flex items-center gap-2 px-5 py-2 rounded-full bg-gold-50 text-gold-700 font-bold tracking-[0.2em] uppercase text-xs mb-6 shadow-sm border border-gold-200">
                                            Module {currentSlide + 1} <span className="text-gold-300">•</span> {slide.subtitle}
                                        </span>
                                        <h2 className="text-4xl md:text-5xl lg:text-6xl font-extrabold text-navy-900 tracking-tight leading-tight px-4">
                                            {slide.title}
                                        </h2>
                                    </div>
                                    
                                    <div className="flex justify-center w-full pb-8 md:pb-16">
                                        {slide.content()}
                                    </div>
                                </div>
                            </div>
                        </main>

                        {/* Teacher Notes Sidebar Panel */}
                        <aside className={`w-80 md:w-96 bg-white border-l border-gray-200 shadow-[-10px_0_30px_rgba(0,0,0,0.05)] z-20 transition-transform duration-300 ease-in-out absolute right-0 h-full ${showNotes ? 'translate-x-0' : 'translate-x-full'}`}>
                            <div className="p-8 h-full flex flex-col bg-gray-50">
                                <h3 className="text-xl font-extrabold text-navy-900 border-b-2 border-gold-500 pb-4 mb-8 flex items-center gap-3">
                                    <Icons.Lightbulb className="text-gold-500" /> Pedagogical Guide
                                </h3>
                                
                                <div className="bg-white p-6 rounded-2xl border border-gold-200 shadow-sm text-gray-700 text-sm leading-relaxed flex-1 overflow-y-auto relative">
                                    <div className="absolute top-0 left-0 w-1 h-full bg-gold-500 rounded-l-2xl"></div>
                                    <span className="block font-bold text-gold-700 mb-4 uppercase tracking-widest text-xs flex items-center gap-2">
                                        <Icons.Star size={14}/> Slide Instructions:
                                    </span>
                                    <p className="text-base text-navy-800 leading-loose">
                                        {slide.note}
                                    </p>
                                </div>
                                
                                <div className="mt-6 text-center text-xs text-gray-400 font-medium uppercase tracking-widest">
                                    Slide {currentSlide + 1} of {MASTERCLASS_DATA.length}
                                </div>
                            </div>
                        </aside>

                    </div>

                    {/* BOTTOM NAVIGATION BAR */}
                    <footer className="bg-white border-t border-gray-200 h-24 px-6 md:px-12 flex justify-between items-center z-40 shadow-[0_-5px_20px_rgba(0,0,0,0.03)] relative">
                        <Button 
                            onClick={prevSlide}
                            disabled={currentSlide === 0}
                            variant="ghost"
                            className="text-gray-500 border-2 border-gray-200 bg-white hover:border-navy-900 hover:text-navy-900 px-4 md:px-8 py-4"
                            icon={null} 
                        >
                            <Icons.ChevronLeft size={24} /> <span className="hidden md:inline text-lg font-bold">Previous</span>
                        </Button>
                        
                        <div className="flex gap-2 hidden lg:flex">
                            {MASTERCLASS_DATA.map((_, idx) => (
                                <div key={idx} className={`h-2.5 rounded-full transition-all duration-300 ${idx === currentSlide ? 'w-8 bg-gold-500' : idx < maxUnlocked ? 'w-2.5 bg-navy-200' : 'w-2.5 bg-gray-200'}`}></div>
                            ))}
                        </div>

                        <Button 
                            onClick={nextSlide}
                            disabled={currentSlide === MASTERCLASS_DATA.length - 1}
                            variant="primary"
                            className="px-6 md:px-10 py-4 text-lg"
                        >
                            <span className="hidden md:inline">Continue</span> <Icons.ChevronRight size={24} />
                        </Button>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
